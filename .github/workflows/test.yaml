name: test

on: 
  [ workflow_dispatch ]

run-name: test transfer info/files/image between jobs 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8         # v3.1.0
        with:
          path: src
      - name: Build image
        run: |
          docker build -t testimage -f src/test/Dockerfile src/test
  run:
    runs-on: ubuntu-latest
    steps:
      - name: run
        run: |
          docker run testimage
